name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test (.NET ${{ matrix.dotnet-version }})
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            dotnet-version: '8.0.x'
            target-framework: 'net8.0'
          - os: windows-latest
            dotnet-version: '8.0.x'
            target-framework: 'net8.0'
        # Note: .NET 10.0 is excluded from CI until SDK is available on GitHub Actions
        # Projects still target net10.0 for future compatibility
        # Note: .NET 6.0 is temporarily removed due to VSTest test discovery compatibility issues
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
    
    - name: Restore dependencies
      run: dotnet restore -p:TargetFrameworks=${{ matrix.target-framework }} --ignore-failed-sources
      continue-on-error: false
    
    - name: Build (excluding MAUI)
      run: |
        # Build all projects except MAUI (MAUI requires platform-specific workloads not available in CI)
        # MAUI projects can only build for platform-specific frameworks (e.g., net10.0-android), not net8.0
        dotnet build --no-restore --configuration Release -f ${{ matrix.target-framework }} \
          src/**/*.csproj \
          tests/**/*.csproj \
          samples/Translaas.Samples.Blazor/Translaas.Samples.Blazor.csproj \
          samples/Translaas.Samples.Console/Translaas.Samples.Console.csproj \
          samples/Translaas.Samples.WebApi/Translaas.Samples.WebApi.csproj \
          samples/Translaas.Samples.WebApp/Translaas.Samples.WebApp.csproj
    
    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory:"${{ github.workspace }}/TestResults" -f ${{ matrix.target-framework }}
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.dotnet-version }}
        path: ${{ github.workspace }}/TestResults/**/*
        retention-days: 30
