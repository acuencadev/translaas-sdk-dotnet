name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Pack and publish to NuGet.org
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Translaas.SDK.slnx

      - name: Build
        run: dotnet build Translaas.SDK.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Translaas.SDK.slnx --configuration Release --no-build --verbosity normal -f net8.0

      - name: Pack
        run: dotnet pack Translaas.SDK.slnx --configuration Release --no-build --output ./nupkgs

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: acuencadev

      - name: Push packages to NuGet.org
        shell: pwsh
        run: |
          Get-ChildItem -Path nupkgs -Filter *.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName `
              --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" `
              --source https://api.nuget.org/v3/index.json `
              --skip-duplicate
          }

          Get-ChildItem -Path nupkgs -Filter *.snupkg | ForEach-Object {
            dotnet nuget push $_.FullName `
              --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" `
              --source https://api.nuget.org/v3/index.json `
              --skip-duplicate
          }
